server:
  port: 8888
spring:
  application:
    name: mall-gateway
  #配置redis地址
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 5000
    lettuce:
      pool:
        max-active: 200
        max-wait: 10000
        max-idle: 100
        min-idle: 10
  #配置nacos注册中心地址
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

    gateway:
      #设置路由：路由id、路由到微服务的uri、断言
      routes:
        - id: order_route  #路由ID，全局唯一，建议配置服务名
          # 测试 http://localhost:8888/order/findOrderByUserId/1
          uri: lb://mall-order  #lb 整合负载均衡器ribbon,loadbalancer
          predicates:
            - Path=/order/**   # 断言，路径相匹配的进行路由
            # Header匹配  请求中带有请求头名为 x-request-id，其值与 \d+ 正则表达式匹配
            #- Header=X-Request-Id, \d+

          #配置过滤器工厂
          filters:
#            - AddRequestHeader=X-Request-color, red  #添加请求头
#            - CheckAuth=fox,男  #自定义过滤器工厂
            - name: RequestRateLimiter   #限流过滤器
              args:
                redis-rate-limiter.replenishRate: 1 #令牌桶每秒填充速率
                redis-rate-limiter.burstCapacity: 2 #令牌桶的总容量
                key-resolver: "#{@keyResolver}" #使用SpEL表达式，从Spring容器中获取Bean对象


        - id: user_route   #路由ID，全局唯一，建议配置服务名
          uri: lb://mall-user  #lb 整合负载均衡器ribbon,loadbalancer
          predicates:
            - Path=/user/**   # 断言，路径相匹配的进行路由

      #白名单配置：匹配的请求跳过Token认证
      whitelist:
        enabled: true
        # 新版规则配置（推荐）：每个请求任一规则命中即放行
        rules:
          # 精确路径匹配
          - type: exact
            path: /user/login
          # Ant 风格路径匹配
          - type: ant
            path: /actuator/**
          # 正则路径匹配
          - type: regex
            path: "^/user/register$"
          # IP 白名单（单IP 或 CIDR 网段）
          # - type: ip
          #   value: 10.0.0.0/8
          # 请求头白名单
          # - type: header
          #   name: X-Internal-Call
          #   value: "^true|1$"
          # 组合规则：路径 + IP 同时满足（AND）
          # - type: ant
          #   path: /admin/**
          #   ip: 10.0.0.0/8
        # 旧版配置（兼容保留，等价于 type=regex）
        paths:
          - "^/user/login$"
          - "^/user/register$"
          - "^/actuator(/.*)?$"

      #跨越配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
            - GET
            - POST
            - DELETE
            - PUT
            - OPTION